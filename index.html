<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Shadow Fight Mini PRO</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
  font-family:sans-serif;
}

canvas {
  display:block;
  background:linear-gradient(#111,#444);
}

/* управление */
#controls {
  position: fixed;
  bottom: 40px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  padding: 0 20px;
}

.group {
  display:flex;
  gap:10px;
}

button {
  font-size: 20px;
  padding: 15px;
  border-radius: 12px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<canvas id="game"></canvas>

<div id="controls">
  <div class="group">
    <button ontouchstart="press('left')" ontouchend="release('left')">⬅️</button>
    <button ontouchstart="press('right')" ontouchend="release('right')">➡️</button>
  </div>

  <div class="group">
    <button ontouchstart="attack()">👊</button>
    <button ontouchstart="kick()">🦵</button>
  </div>
</div>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

// адаптивный экран
function resizeCanvas(){
  c.width = window.innerWidth;
  c.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

// управление
let keys = {};
function press(k){ keys[k]=true; }
function release(k){ keys[k]=false; }

document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

// персонажи
let player, enemy;
let round = 1;
let gameOver = false;

function resetRound(){
  player = {x:50, y:c.height-70, hp:300, attacking:false};
  enemy = {x:c.width-80, y:c.height-70, hp:500};
}
resetRound();

// рисование персонажа (силуэт)
function drawStick(x,y,attack=false,color="white"){
  ctx.strokeStyle=color;
  ctx.lineWidth=3;

  ctx.beginPath();
  ctx.arc(x,y-30,10,0,Math.PI*2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x,y-20);
  ctx.lineTo(x,y+10);
  ctx.stroke();

  ctx.beginPath();
  if(attack){
    ctx.moveTo(x,y-10);
    ctx.lineTo(x+25,y-5);
  } else {
    ctx.moveTo(x,y-10);
    ctx.lineTo(x-15,y);
    ctx.moveTo(x,y-10);
    ctx.lineTo(x+15,y);
  }
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x,y+10);
  ctx.lineTo(x-10,y+30);
  ctx.moveTo(x,y+10);
  ctx.lineTo(x+10,y+30);
  ctx.stroke();
}

// эффекты ударов
let hits = [];
function addHit(x,y){
  hits.push({x,y,life:10});
}

function update(){
  if(gameOver) return;

  // движение
  if(keys["ArrowRight"] || keys["right"]) player.x+=3;
  if(keys["ArrowLeft"] || keys["left"]) player.x-=3;

  // атака
  if(keys[" "]){
    player.attacking=true;
    if(Math.abs(player.x-enemy.x)<50){
      enemy.hp-=0.5;
      addHit(enemy.x, enemy.y-20);
    }
  } else {
    player.attacking=false;
  }

  // ИИ
  if(Math.random()<0.02){
    if(enemy.x>player.x) enemy.x-=20;
    else enemy.x+=20;
  }

  if(Math.abs(enemy.x-player.x)<40 && Math.random()<0.03){
    player.hp-=2;
    addHit(player.x, player.y-20);
  }

  // реген
  if(player.hp<300) player.hp+=0.02;
  if(enemy.hp<500) enemy.hp+=0.01;

  // границы
  player.x=Math.max(20,Math.min(c.width-20,player.x));
  enemy.x=Math.max(20,Math.min(c.width-20,enemy.x));

  // победа / поражение
  if(player.hp<=0){
    gameOver=true;
    setTimeout(()=>{
      round=1;
      gameOver=false;
      resetRound();
    },2000);
  }

  if(enemy.hp<=0){
    round++;
    resetRound();
  }

  // эффекты
  hits.forEach(h=>h.life--);
  hits = hits.filter(h=>h.life>0);
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);

  // земля
  ctx.fillStyle="#222";
  ctx.fillRect(0,c.height-40,c.width,40);

  drawStick(player.x, player.y, player.attacking, "white");
  drawStick(enemy.x, enemy.y, false, "red");

  // HP
  ctx.fillStyle="green";
  ctx.fillRect(20,20,player.hp/2,12);

  ctx.fillStyle="red";
  ctx.fillRect(c.width-(enemy.hp/2)-20,20,enemy.hp/2,12);

  // текст
  ctx.fillStyle="white";
  ctx.fillText("Раунд: "+round, c.width/2-30, 30);

  if(gameOver){
    ctx.fillStyle="red";
    ctx.fillText("Ты проиграл!", c.width/2-50, c.height/2);
  }

  // эффекты
  hits.forEach(h=>{
    ctx.fillStyle="yellow";
    ctx.fillRect(h.x,h.y,6,6);
  });
}

// атаки с кнопок
function attack(){
  if(Math.abs(player.x-enemy.x)<50){
    enemy.hp-=2;
    addHit(enemy.x, enemy.y-20);
  }
}

function kick(){
  if(Math.abs(player.x-enemy.x)<60){
    enemy.hp-=3;
    addHit(enemy.x, enemy.y-20);
  }
}

// игровой цикл
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
